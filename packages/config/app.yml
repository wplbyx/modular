application:
  Name: "custom-modular-monolith"
  Mode: "prod"
  Version: "v1.0.0"
  ShutdownTimeout: "10s"

logging:
  Level: "info"
  Output:
    - "console"
  File:
    Filename: "./logs/app.log"
    MaxSize: 200
    MaxBackups: 7
    MaxAge: 15
    Compress: true
    SplitRange: "daily"
  OTel:
    Endpoint: ""
    Insecure: true

database:
  Dsn: "postgres"
  Urls:
    - "postgres://user:password@db1.example.com:5432/mydb?sslmode=require"
  Host: "db1.example.com"
  Port: 5432
  Database: "mydb"
  Username: "user"
  Password: "password"
  MaxOpenConn: 50
  MaxIdleConn: 10
  ConnMaxLifetime: "1h"
  ConnMaxIdleTime: "30m"
  EnableTLS: true

redis:
  Host: "127.0.0.1"
  Port: 6379
  Username: ""
  Password: "your-redis-password"
  Database: 0
  PoolSize: 10
  MinIdleConn: 5
  DialTimeout: "5s"
  ReadTimeout: "3s"
  WriteTimeout: "3s"
  MaxRetries: 3
  MinRetryBackoff: 8
  MaxRetryBackoff: 512

http:
  Host: "0.0.0.0"
  Port: 18080
  ReadHeaderTimeout: "5s"
  ReadTimeout: "30s"
  WriteTimeout: "30s"
  IdleTimeout: "120s"
  ShutdownTimeout: "45s"
  EnableTLS: false
  TLSKeyFile: ""
  TLSCertFile: ""

grpc:
  Host: "0.0.0.0"
  Port: 28080
  Timeout: "15s"
  ShutdownTimeout: "45s"
  EnableTLS: false
  TLSKeyFile: ""
  TLSCertFile: ""

storage:
  Type: "disk"
  PublicBaseURL: "http://localhost:18080/files"
  Disk:
    RootDir: "./storage/upload"
    BaseUrl: "http://localhost:18080/files"
  OSS:
    AccessKeyID: ""
    AccessKeySecret: ""
    SecurityToken: ""
    Region: "cn-hangzhou"
    Bucket: ""
    Endpoint: "https://oss-cn-hangzhou.aliyuncs.com"
    BaseDir: ""
    DisableSSL: false
    UseCName: false
    Timeout: "60s"
    MaxRetries: 3

kafka:
  brokers:
    - "kafka1.example.com:9092"
    - "kafka2.example.com:9092"
  producer:
    topic: "order-events"
    required_ack: "all"
    compression: "snappy"
    batch_size: 200
    batch_timeout: "20ms"
    balancer: "hash"
  consumer:
    topic: "order-events"
    group_id: "order-service-group"
    min_bytes: 10000
    max_bytes: 10000000
    start_offset: "newest"
    commit_interval: 0
    max_retries: 5
    dlq_topic: "order-events-dlq"
